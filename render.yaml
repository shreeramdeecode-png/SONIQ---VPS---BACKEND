services:
  - type: web
    name: soniq-api
    runtime: node
    region: singapore
    plan: free
    autoDeploy: false  # GitHub Actions controls deploys

    buildCommand: npm ci --include=dev && npx prisma generate && npx prisma db push && npm run build
    startCommand: node dist/app.js

    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000

      # Set these manually in Render dashboard → Environment
      - key: JWT_SECRET_CLIENT
        sync: false
      - key: JWT_SECRET_SUPERADMIN
        sync: false
      - key: ENCRYPTION_KEY
        sync: false

      # Auto-wired from the database below
      - key: DATABASE_URL
        fromDatabase:
          name: soniq-db
          property: connectionString

databases:
  - name: soniq-db
    databaseName: soniq
    user: soniq
    plan: free
    region: singapore
